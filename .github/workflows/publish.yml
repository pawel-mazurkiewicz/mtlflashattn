name: Publish to PyPI

# Builds and publishes to PyPI whenever a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in GitHub.
#
# One-time PyPI setup (https://pypi.org/manage/project/mtlflashattn/settings/publishing/):
#   Owner:            pawel-mazurkiewicz
#   Repository name:  mtlflashattn
#   Workflow name:    publish.yml
#   Environment name: pypi
# (Until that trusted publisher is added, this workflow will fail to authenticate.)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pypi-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mtlflashattn
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password/token: authentication is via OIDC Trusted Publishing.
          skip-existing: true
